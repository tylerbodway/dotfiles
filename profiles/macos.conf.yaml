- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- create:
    ~/.ssh:
      mode: 0700
    ~/bin:
    ~/Code:
    ~/Projects:
    ~/Drive:

- link:
    ~/.1password:
      path: "~/Library/Group Containers/2BUA8C4S2C.com.1password/t"
    ~/bin/:
      glob: true
      path: bin/**
      force: true
    ~/cloud-box:
      force: true
      path: ~/Code
    ~/.editorconfig:
    ~/.gemrc:
    ~/.gitconfig:
    ~/Code/.gitconfig_include: gitconfig_company
    ~/.gitignore:
    ~/.hushlogin:
    ~/.zshrc:

- brewfile:
    - brew/Brewfile

- shell:
  -
    command: chmod -R 755 ~/bin
    description: Ensuring ~/bin scripts are executable
    quiet: true
