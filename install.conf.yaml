- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- link:
    ~/.editorconfig:
    ~/.gemrc:
    ~/.gitconfig:
    ~/.gitignore:
    ~/.hushlogin:
    ~/.zshrc:

- create:
    ~/.ssh:
      mode: 0700
    ~/Code:
    ~/Projects:
    ~/Drive:

- shell:
  - [git submodule update --init --recursive, Installing submodules]
