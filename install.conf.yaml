- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- link:
    ~/.editorconfig:
    ~/.gemrc:
    ~/.gitconfig:
    ~/.gitignore:
    ~/.hushlogin:
    ~/.zshrc:

- create:
    ~/.ssh:
      mode: 0700
    ~/Code:
    ~/Projects:
    ~/Drive:

- shell:
  -
    command: git submodule update --init --recursive
    description: Installing git submodules
    quiet: true
  -
    command: brew bundle install --file $DOTFILES/brew/Brewfile
    description: Installing Homebrew dependencies
    stdout: true
    stderr: true
