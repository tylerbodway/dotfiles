- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- create:
    ~/.ssh:
      mode: 0700
    ~/bin:
    ~/Code:
    ~/Projects:
    ~/Drive:

- link:
    ~/bin/:
      glob: true
      path: bin/*
    ~/cloud-box:
      force: true
      path: ~/Code
    ~/.editorconfig:
    ~/.gemrc:
    ~/.gitconfig:
    ~/Code/.gitconfig_include: gitconfig_company
    ~/.gitignore:
    ~/.hushlogin:
    ~/.zshrc:

- brewfile:
    - brew/Brewfile

- shell:
  -
    command: git submodule update --init --recursive
    description: Installing git submodules
    quiet: true
  -
    command: chmod 755 ~/bin/*
    description: Ensuring ~/bin scripts are executable
    quiet: true
