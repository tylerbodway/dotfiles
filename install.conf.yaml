- defaults:
    link:
      create: true
      relink: true

- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true

- link:
    ~/.editorconfig:
    ~/.gemrc:
    ~/.gitconfig:
    ~/.gitignore:
    ~/.hushlogin:
    ~/.zshrc:

- create:
    ~/.ssh:
      mode: 0700
    ~/Code:
    ~/Projects:
    ~/Drive:
    ~/.nvm:

- brewfile:
    - brew/Brewfile

- shell:
  -
    command: git submodule update --init --recursive
    description: Installing git submodules
    quiet: true
